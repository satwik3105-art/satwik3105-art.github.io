<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog · Satwik Mahapatra</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav>
  <a href="index.html" class="nav-brand">Satwik Mahapatra</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="about.html">About</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="resources.html">Resources</a></li>
    <li><a href="cv.html">CV</a></li>
  </ul>
  <div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
</nav>
<main>
  <div class="page-content">
    <h1><strong>Blog</strong></h1>
    <div class="blog-list" id="blogList">
      <p style="color:var(--muted)">Loading posts...</p>
    </div>
  </div>
</main>
<footer>
  <p>Made with ❤️ by <strong>Satwik Mahapatra</strong> · <a href="https://pages.github.com" target="_blank">GitHub Pages</a> · <a href="mailto:satwik3105@gmail.com">satwik3105@gmail.com</a></p>
</footer>
<script src="nav.js"></script>
<script src="posts.js"></script>
<script>
  const list = document.getElementById('blogList');
  if (!window.POSTS || POSTS.length === 0) {
    list.innerHTML = '<p style="color:var(--muted)">No posts yet — check back soon!</p>';
  } else {
    list.innerHTML = POSTS.map(p => {
      const d = new Date(p.date);
      const day = d.getDate();
      const mon = d.toLocaleString('en', {month:'short', year:'numeric'});
      return `
        <a href="post.html?id=${p.id}" style="text-decoration:none;color:inherit;">
          <div class="blog-item">
            <div class="blog-date">
              <div class="day">${day}</div>
              ${mon}
            </div>
            <div class="blog-content">
              <h3>${p.title}</h3>
              <p>${p.excerpt}</p>
              <div class="tags" style="margin-top:8px">
                ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
              </div>
            </div>
          </div>
        </a>`;
    }).join('');
  }
</script>
</body>
</html>
