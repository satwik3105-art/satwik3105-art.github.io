<body>

  <ul class="nav-links" id="navLinks">
    <li><a href="about.html">About</a></li>

  </ul>
  <div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>

<main>
  <div class="page-content" id="postContent">
    <p style="color:var(--muted)">Loading post...</p>
  </div>
</main>
<footer>
  <p>Made with ❤️ by <strong>Satwik Mahapatra</strong> · <a href="https://pages.github.com" target="_blank">GitHub Pages</a> · <a href="mailto:satwik3105@gmail.com">satwik3105@gmail.com</a></p>
</footer>
<script src="nav.js"></script>
<script src="posts.js"></script>
<!-- marked.js for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const post = POSTS.find(p => p.id === id);
  const container = document.getElementById('postContent');

  if (!post) {
    container.innerHTML = `<a href="blog.html" class="back-link">← Back to Blog</a><p>Post not found.</p>`;
  } else {
    document.title = post.title + ' · Satwik Mahapatra';
    const d = new Date(post.date);
    const dateStr = d.toLocaleDateString('en', {day:'numeric', month:'long', year:'numeric'});
    container.innerHTML = `
      <a href="blog.html" class="back-link">← Back to Blog</a>
      <div class="post-header">
        <h1>${post.title}</h1>
        <div class="post-meta">
          <span>📅 ${dateStr}</span>
          <span>✍️ Satwik Mahapatra</span>
          ${post.readTime ? `<span>⏱️ ${post.readTime} min read</span>` : ''}
        </div>
      </div>
      <div class="post-body">${marked.parse(post.content)}</div>
      <div class="post-tags" style="margin-top:32px;padding-top:20px;border-top:1px solid var(--border);">
        <div class="tags">${post.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="post-nav">
        <a href="blog.html">← Back to all posts</a>
      </div>`;
  }
</script>
</body>
</html>
